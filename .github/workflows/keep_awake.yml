name: Keep Streamlit App Awake

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Simple Ping to Wake Up
        run: |
          curl -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" -sL -w "HTTP Status: %{http_code}\n" https://ncyu-carbon-app-mduue5hffp7uknsskmjet9.streamlit.app/ -o /dev/null
