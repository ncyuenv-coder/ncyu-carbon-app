name: Keep Streamlit App Awake

on:
  schedule:
    # 調整為每 3 小時執行一次（於第 0 分鐘觸發）
    - cron: "0 */3 * * *" 
  workflow_dispatch: 

jobs:
  ping-site:
    runs-on: ubuntu-latest
    steps:
      - name: 雙重喚醒 Streamlit 網站 (每3小時)
        run: |
          # 1. 敲擊主頁面，確保前端網頁存活
          echo "Pinging Main Page..."
          curl -s -o /dev/null -w "Main Page Status: %{http_code}\n" https://ncyu-carbon-app-mduue5hffp7uknsskmjet9.streamlit.app/
          
          # 2. 暫停 5 秒，給伺服器一點緩衝時間
          sleep 5
          
          # 3. 敲擊後端核心端點，確保底層 Python 運算資源保持活躍
          echo "Pinging Health Check..."
          curl -s -o /dev/null -w "Health Check Status: %{http_code}\n" https://ncyu-carbon-app-mduue5hffp7uknsskmjet9.streamlit.app/_stcore/health
